services:
  # ­¤īÉ API gateway / BFF (Gateway)
  potok-gateway:
    image: ghcr.io/potok-media/potok-gateway:latest
    container_name: potok-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-5000}:${GATEWAY_PORT:-5000}"
    environment:
      - PORT=${GATEWAY_PORT:-5000}
      # Connection string is assembled from the DB_* parts (single source of truth).
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST:-db};Port=${DB_PORT:-5432};Database=${DB_NAME:-potok};Username=${DB_USER:-potok};Password=${DB_PASSWORD:-potok};Timeout=30;CommandTimeout=60;
      - Gateway__TmdbApiKey=${TMDB_API_KEY}
      - Gateway__MultiUserMode=${GATEWAY_MULTI_USER_MODE:-false}
      - Gateway__JwtSecret=${GATEWAY_JWT_SECRET:-default-fallback-gateway-jwt-secret-key-32-chars-long}
      # Telegram login: set both to enable auth/registration via the Telegram Login Widget.
      - Gateway__TelegramBotToken=${GATEWAY_TELEGRAM_BOT_TOKEN:-}
      - Gateway__TelegramBotUsername=${GATEWAY_TELEGRAM_BOT_USERNAME:-}
    depends_on:
      db:
        condition: service_healthy

  # ­¤öŹ Tracker search engine (SearchEngine)
  potok-searchengine:
    image: ghcr.io/potok-media/potok-searchengine:latest
    container_name: potok-searchengine
    restart: unless-stopped
    ports:
      - "${SEARCH_ENGINE_PORT:-6000}:${SEARCH_ENGINE_PORT:-6000}"
    environment:
      - PORT=${SEARCH_ENGINE_PORT:-6000}
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST:-db};Port=${DB_PORT:-5432};Database=${DB_NAME:-potok};Username=${DB_USER:-potok};Password=${DB_PASSWORD:-potok};Timeout=30;CommandTimeout=60;
    volumes:
      # Mount the tracker config so it can be edited on the host without rebuilding.
      - ./config.yml:/app/config.local.yml
    depends_on:
      db:
        condition: service_healthy

  # ­¤īŖ BitTorrent streaming engine (TorrentGo)
  potok-torrentgo:
    image: ghcr.io/potok-media/potok-torrentgo:latest
    container_name: potok-torrentgo
    restart: unless-stopped
    ports:
      - "${TORRENTGO_PORT:-5282}:${TORRENTGO_PORT:-5282}"
      # ------------------------------------------------------------------------
      # Inbound BitTorrent connections (DHT / peer listen port)
      # ------------------------------------------------------------------------
      # - "55123:55123/udp"
      #
      # ­¤ÆĪ NOTE FOR NAT / TAILSCALE SETUPS:
      # If your server sits behind NAT without port forwarding, or is reached over Tailscale,
      # inbound UDP connections from the public BitTorrent network can't reach the container
      # directly. In that case this mapping is useless and should stay COMMENTED OUT.
      # TorrentGo automatically falls back to outbound-only connections, which is more than
      # enough for stable downloading and media streaming.
      # ------------------------------------------------------------------------
    environment:
      - PORT=${TORRENTGO_PORT:-5282}
      # TMDB lookup for the Add-torrent dialog (same key as the gateway).
      - TMDB_API_KEY=${TMDB_API_KEY}
    # Hardware transcoding: default maps a harmless no-op device so this works on any host. Set
    # GPU_DEVICE=/dev/dri:/dev/dri in your .env (Intel/AMD) to pass a GPU in ŌĆö TorrentGo then
    # auto-detects and uses it (only if it passes a startup probe incl. keyframe alignment), else
    # stays on software. Force software with POTOK_DISABLE_HWACCEL=1.
    devices:
      - ${GPU_DEVICE:-/dev/null:/dev/null}

  # ­¤Śä’ĖÅ PostgreSQL (bundled ŌĆö required by Gateway and SearchEngine).
  # To use an external/shared database instead, point DB_HOST at it and remove this service.
  db:
    image: postgres:16-alpine
    container_name: potok-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-potok}
      POSTGRES_USER: ${DB_USER:-potok}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-potok}
    expose:
      - "5432"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - potok-db:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${DB_USER:-potok} -d ${DB_NAME:-potok}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  potok-db:
    name: potok_db
