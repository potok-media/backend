<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="originalBg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#020815" />
      <stop offset="100%" stop-color="#01040A" />
    </radialGradient>
    <linearGradient id="originalPlayGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#38E5FF" />
      <stop offset="60%" stop-color="#00A2FF" />
      <stop offset="100%" stop-color="#0052FF" />
    </linearGradient>
    <filter id="preciseGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="24" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="dashesGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Scale everything to 82% to match macOS system icon margins (Apple HIG) -->
  <g transform="translate(256, 256) scale(0.82) translate(-256, -256)">
    <!-- Background Squircle with proper macOS corner radius -->
    <rect width="512" height="512" rx="118" fill="url(#originalBg)" />
    
    <!-- Content group with the centering fix (+10) -->
    <g transform="translate(10, 0)">
      <g filter="url(#dashesGlow)" opacity="0.9">
        <rect x="24" y="248" width="16" height="16" rx="8" fill="#00E5FF" opacity="0.18" />
        <rect x="52" y="248" width="32" height="16" rx="8" fill="#00E5FF" opacity="0.4" />
        <rect x="96" y="248" width="24" height="16" rx="8" fill="#00E5FF" opacity="0.85" />
        <rect x="58" y="210" width="20" height="10" rx="5" fill="#00E5FF" opacity="0.25" />
        <rect x="58" y="292" width="20" height="10" rx="5" fill="#00E5FF" opacity="0.25" />
        <rect x="372" y="248" width="56" height="16" rx="8" fill="#0066FF" opacity="0.85" />
        <rect x="440" y="248" width="30" height="16" rx="8" fill="#0066FF" opacity="0.4" />
        <rect x="482" y="248" width="14" height="16" rx="8" fill="#0066FF" opacity="0.15" />
      </g>
      <g filter="url(#preciseGlow)">
        <path d="M 156,130 C 206,165 276,210 336,256 C 276,302 206,347 156,382 Q 226,256 156,130 Z" fill="url(#originalPlayGrad)" />
        <path d="M 166,146 C 211,178 274,218 324,256 C 274,294 211,334 166,366 Q 228,256 166,146 Z" fill="#FFFFFF" opacity="0.18" />
      </g>
    </g>
  </g>
</svg>
