name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Выберите сервис для сборки и деплоя (all - собрать все)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - torrentgo
          - gateway
          - searchengine

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Buildx runner
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Format repository names to lowercase to satisfy Docker naming rules
      - name: Get lowercased owner and repo names
        id: prep
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=${OWNER_LC}" >> $GITHUB_OUTPUT

      # --- Build & Push: TorrentGo ---
      - name: Extract TorrentGo metadata
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'torrentgo'
        id: meta-torrentgo
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.owner_lc }}/potok-torrentgo

      - name: Build and Push TorrentGo
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'torrentgo'
        uses: docker/build-push-action@v6
        with:
          context: ./src/Potok.Backend.TorrentGo
          file: ./src/Potok.Backend.TorrentGo/Dockerfile
          push: true
          tags: ${{ steps.meta-torrentgo.outputs.tags }}
          labels: ${{ steps.meta-torrentgo.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Build & Push: Gateway ---
      - name: Extract Gateway metadata
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'gateway'
        id: meta-gateway
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.owner_lc }}/potok-gateway

      - name: Build and Push Gateway
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'gateway'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Potok.Backend.Gateway/Dockerfile
          push: true
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Build & Push: SearchEngine ---
      - name: Extract SearchEngine metadata
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'searchengine'
        id: meta-searchengine
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.owner_lc }}/potok-searchengine

      - name: Build and Push SearchEngine
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'searchengine'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Potok.Backend.SearchEngine/Dockerfile
          push: true
          tags: ${{ steps.meta-searchengine.outputs.tags }}
          labels: ${{ steps.meta-searchengine.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
