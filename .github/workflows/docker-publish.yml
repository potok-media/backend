name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Тип обновления версии'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
      is_beta:
        description: 'Выпустить как бета-версию (pre-release)'
        required: true
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ${{ github.repository }}

jobs:
  # --- Versioning: compute the new version, push the git tag, expose values to downstream jobs ---
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.get_version.outputs.new_version }}
      tag_secondary: ${{ steps.get_version.outputs.tag_secondary }}
      prerelease: ${{ steps.get_version.outputs.prerelease }}
      owner_lc: ${{ steps.prep.outputs.owner_lc }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Bump Type
        id: parse_bump
        run: |
          INPUT_TYPE="${{ github.event.inputs.bump_type }}"
          if [[ "$INPUT_TYPE" == *"major"* ]]; then
            echo "BUMP=major" >> $GITHUB_ENV
          elif [[ "$INPUT_TYPE" == *"minor"* ]]; then
            echo "BUMP=minor" >> $GITHUB_ENV
          else
            echo "BUMP=patch" >> $GITHUB_ENV
          fi

      - name: Get current version and bump
        id: get_version
        run: |
          # Fetch all tags from remote repository to have correct tag history
          git fetch --tags --force

          # Get latest tag matching "v*" or fallback to "v0.0.0"
          LATEST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "v0.0.0")
          echo "Latest Git Tag: $LATEST_TAG"

          CURRENT_VERSION="${LATEST_TAG#v}"
          IS_BETA="${{ github.event.inputs.is_beta }}"
          BUMP="${{ env.BUMP }}"

          if [[ "$CURRENT_VERSION" == *"-beta."* ]]; then
            BASE="${CURRENT_VERSION%-beta.*}"
            BETA_NUM="${CURRENT_VERSION##*-beta.}"
            HAS_BETA=true
          else
            BASE="$CURRENT_VERSION"
            BETA_NUM=0
            HAS_BETA=false
          fi

          IFS='.' read -r -a parts <<< "$BASE"
          MAJOR="${parts[0]:-1}"
          MINOR="${parts[1]:-0}"
          PATCH="${parts[2]:-0}"

          if [ "$IS_BETA" = "true" ]; then
            if [ "$HAS_BETA" = "true" ]; then
              NEW_BETA_NUM=$((BETA_NUM + 1))
              NEW_VERSION="$BASE-beta.$NEW_BETA_NUM"
            else
              if [ "$BUMP" = "major" ]; then
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
              elif [ "$BUMP" = "minor" ]; then
                MINOR=$((MINOR + 1))
                PATCH=0
              else
                PATCH=$((PATCH + 1))
              fi
              NEW_VERSION="$MAJOR.$MINOR.$PATCH-beta.1"
            fi
            echo "tag_secondary=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            if [ "$HAS_BETA" = "true" ]; then
              NEW_VERSION="$BASE"
            else
              if [ "$BUMP" = "major" ]; then
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
              elif [ "$BUMP" = "minor" ]; then
                MINOR=$((MINOR + 1))
                PATCH=0
              else
                PATCH=$((PATCH + 1))
              fi
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            fi
            echo "tag_secondary=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Push Git Tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag "v${{ steps.get_version.outputs.new_version }}"
          git push origin "v${{ steps.get_version.outputs.new_version }}"

      - name: Get lowercased owner name
        id: prep
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=${OWNER_LC}" >> $GITHUB_OUTPUT

  # --- Build & push all images in parallel (wall-clock = slowest image, not the sum) ---
  build:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gateway
            image: potok-gateway
            context: .
            file: ./src/Potok.Backend.Gateway/Dockerfile
          - name: searchengine
            image: potok-searchengine
            context: .
            file: ./src/Potok.Backend.SearchEngine/Dockerfile
          - name: torrentgo
            image: potok-torrentgo
            context: ./src/Potok.Backend.TorrentGo
            file: ./src/Potok.Backend.TorrentGo/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract ${{ matrix.name }} metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.version.outputs.owner_lc }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.version.outputs.tag_secondary }}
            type=raw,value=${{ needs.version.outputs.new_version }}

      - name: Build and Push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.version.outputs.new_version }}
          # Registry-backed build cache (a :buildcache tag per image). Unlike GHA cache it has no
          # 10 GB / LRU eviction, so the expensive TorrentGo stage that compiles FFmpeg from source
          # persists across releases and is reused until FFMPEG_VERSION or the build flags change.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ needs.version.outputs.owner_lc }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ needs.version.outputs.owner_lc }}/${{ matrix.image }}:buildcache,mode=max

  # --- GitHub Release (after all images are published) ---
  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: Backend Release v${{ needs.version.outputs.new_version }}
          generate_release_notes: true
          prerelease: ${{ needs.version.outputs.prerelease }}
