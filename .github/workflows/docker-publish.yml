name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Выберите сервис для сборки и деплоя (all - собрать все)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - gateway
          - searchengine
      bump_type:
        description: 'Тип обновления версии'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
      is_beta:
        description: 'Выпустить как бета-версию (pre-release)'
        required: true
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Versioning ---
      - name: Extract Bump Type
        id: parse_bump
        run: |
          INPUT_TYPE="${{ github.event.inputs.bump_type }}"
          if [[ "$INPUT_TYPE" == *"major"* ]]; then
            echo "BUMP=major" >> $GITHUB_ENV
          elif [[ "$INPUT_TYPE" == *"minor"* ]]; then
            echo "BUMP=minor" >> $GITHUB_ENV
          else
            echo "BUMP=patch" >> $GITHUB_ENV
          fi

      - name: Get current version and bump
        id: get_version
        run: |
          if [ ! -f VERSION ]; then
            echo "1.0.0" > VERSION
          fi
          CURRENT_VERSION=$(cat VERSION)
          IS_BETA="${{ github.event.inputs.is_beta }}"
          BUMP="${{ env.BUMP }}"
          
          if [[ "$CURRENT_VERSION" == *"-beta."* ]]; then
            BASE="${CURRENT_VERSION%-beta.*}"
            BETA_NUM="${CURRENT_VERSION##*-beta.}"
            HAS_BETA=true
          else
            BASE="$CURRENT_VERSION"
            BETA_NUM=0
            HAS_BETA=false
          fi
          
          IFS='.' read -r -a parts <<< "$BASE"
          MAJOR="${parts[0]:-1}"
          MINOR="${parts[1]:-0}"
          PATCH="${parts[2]:-0}"
          
          if [ "$IS_BETA" = "true" ]; then
            if [ "$HAS_BETA" = "true" ]; then
              NEW_BETA_NUM=$((BETA_NUM + 1))
              NEW_VERSION="$BASE-beta.$NEW_BETA_NUM"
            else
              if [ "$BUMP" = "major" ]; then
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
              elif [ "$BUMP" = "minor" ]; then
                MINOR=$((MINOR + 1))
                PATCH=0
              else
                PATCH=$((PATCH + 1))
              fi
              NEW_VERSION="$MAJOR.$MINOR.$PATCH-beta.1"
            fi
            echo "DOCKER_TAG_SECONDARY=beta" >> $GITHUB_ENV
            echo "PRERELEASE=true" >> $GITHUB_ENV
          else
            if [ "$HAS_BETA" = "true" ]; then
              NEW_VERSION="$BASE"
            else
              if [ "$BUMP" = "major" ]; then
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
              elif [ "$BUMP" = "minor" ]; then
                MINOR=$((MINOR + 1))
                PATCH=0
              else
                PATCH=$((PATCH + 1))
              fi
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            fi
            echo "DOCKER_TAG_SECONDARY=latest" >> $GITHUB_ENV
            echo "PRERELEASE=false" >> $GITHUB_ENV
          fi
          
          echo "$NEW_VERSION" > VERSION
          echo "new_version=$NEW_VERSION" >> $GITHUB_ENV
          
          # Update .csproj files
          find src -name "*.csproj" -exec sed -i "s|<PropertyGroup>|<PropertyGroup>\n        <Version>$NEW_VERSION</Version>|g" {} +
          # Prevent duplicate Version tags if they already existed (simple approach)
          find src -name "*.csproj" -exec sed -i "N;s|<Version>.*</Version>\n.*<Version>|<Version>|;P;D" {} +

      - name: Commit version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -am "Bump backend version to ${{ env.new_version }}"
          git push

      # Set up Buildx runner
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Format repository names to lowercase to satisfy Docker naming rules
      - name: Get lowercased owner and repo names
        id: prep
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=${OWNER_LC}" >> $GITHUB_OUTPUT



      # --- Build & Push: Gateway ---
      - name: Extract Gateway metadata
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'gateway'
        id: meta-gateway
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.owner_lc }}/potok-gateway
          tags: |
            type=raw,value=${{ env.DOCKER_TAG_SECONDARY }}
            type=raw,value=${{ env.new_version }}

      - name: Build and Push Gateway
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'gateway'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Potok.Backend.Gateway/Dockerfile
          push: true
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Build & Push: SearchEngine ---
      - name: Extract SearchEngine metadata
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'searchengine'
        id: meta-searchengine
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.owner_lc }}/potok-searchengine
          tags: |
            type=raw,value=${{ env.DOCKER_TAG_SECONDARY }}
            type=raw,value=${{ env.new_version }}

      - name: Build and Push SearchEngine
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'searchengine'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Potok.Backend.SearchEngine/Dockerfile
          push: true
          tags: ${{ steps.meta-searchengine.outputs.tags }}
          labels: ${{ steps.meta-searchengine.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Create GitHub Release ---
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.new_version }}
          name: Backend Release v${{ env.new_version }}
          generate_release_notes: true
          prerelease: ${{ env.PRERELEASE }}
